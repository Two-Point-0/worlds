<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLDS — Advanced</title>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
  }
}
</script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div onclick="showPage('home')">🌍 Home</div>
  <div onclick="showPage('battle')">⚔️ Battle</div>
  <div onclick="showPage('market')">🛒 Market</div>
</div>

<div id="home" class="page active">
  <canvas id="globe"></canvas>
  <div id="infoBox">Click a location</div>
</div>

<div id="universe" class="page"></div>

<div id="battle" class="page">
  <h2>Battle Arena</h2>
  <div id="fighters"></div>
  <button onclick="startBattle()">FIGHT</button>
  <div id="battleLog"></div>
</div>

<div id="market" class="page">
  <h2>Market</h2>
  <input id="title" placeholder="Title">
  <input id="price" placeholder="Price">
  <button onclick="addItem()">Add</button>
  <div id="marketList"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>

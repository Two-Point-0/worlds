<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLDS — Multiverse Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#050508;
  color:#fff;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#0d0d12;
  border-bottom:1px solid #222;
}
nav div{
  cursor:pointer;
  margin-right:15px;
}

/* PAGE */
.page{display:none;padding:30px}
.active{display:block}

/* HOME */
.home h1{
  font-size:60px;
}
.universes button{
  margin:10px;
  padding:10px 20px;
}

/* UNIVERSE */
.universe{
  display:flex;
  gap:20px;
}
.hero{
  width:40%;
}
.villains{
  display:flex;
  gap:10px;
  overflow-x:auto;
}
.villain{
  min-width:80px;
  text-align:center;
  cursor:pointer;
}

/* BATTLE */
.battle-select{
  display:flex;
  justify-content:center;
  gap:20px;
}
.log{
  background:#111;
  padding:10px;
  height:300px;
  overflow:auto;
  margin-top:20px;
}

/* BAZAAR */
input,textarea{
  width:100%;
  padding:8px;
  margin:5px 0;
}
.listing{
  border:1px solid #333;
  padding:10px;
  margin-top:10px;
}
</style>

</head>

<body>

<nav>
  <div onclick="showPage('home')">Home</div>
  <div onclick="showPage('battle')">Battle</div>
  <div onclick="showPage('bazaar')">Bazaar</div>
</nav>

<!-- HOME -->

<div id="home" class="page active home">
  <h1>🌌 WORLDS</h1>
  <p>Choose a universe</p>
  <div class="universes">
    <button onclick="openUniverse('marvel')">Marvel</button>
    <button onclick="openUniverse('dc')">DC</button>
    <button onclick="openUniverse('anime')">Anime</button>
  </div>
</div>

<!-- UNIVERSE -->

<div id="universe" class="page">
  <button onclick="showPage('home')">⬅ Back</button>
  <div class="universe">
    <div class="hero">
      <h2 id="heroName"></h2>
      <p id="heroPower"></p>
    </div>
    <div>
      <h3>Villains</h3>
      <div class="villains" id="villains"></div>
    </div>
  </div>
</div>

<!-- BATTLE -->

<div id="battle" class="page">
  <h2>⚔️ Battle</h2>

  <div class="battle-select">
    <select id="f1"></select>
    VS
    <select id="f2"></select>
  </div>

<button onclick="fight()">FIGHT</button>

  <div class="log" id="log"></div>
</div>

<!-- BAZAAR -->

<div id="bazaar" class="page">
  <h2>🛒 Bazaar</h2>

  <input id="title" placeholder="Title">
  <input id="price" placeholder="Price">
  <textarea id="desc" placeholder="Description"></textarea>
  <input type="file" id="file" multiple>

<button onclick="publish()">Publish</button>

  <div id="listings"></div>
</div>

<script>

/* DATA */
const heroes = [
  {name:"Iron Man", power:"Suit tech", villains:["Thanos","Ultron"]},
  {name:"Captain America", power:"Shield + strength", villains:["Red Skull"]},
  {name:"Batman", power:"Gadgets", villains:["Joker"]},
  {name:"Superman", power:"God-like", villains:["Doomsday"]},
  {name:"Goku", power:"Ultra Instinct", villains:["Frieza"]},
  {name:"Naruto", power:"Rasengan", villains:["Pain"]}
];

/* NAV */
function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

/* UNIVERSE */
function openUniverse(type){
  showPage('universe');
  let h = heroes[Math.floor(Math.random()*heroes.length)];
  document.getElementById('heroName').innerText = h.name;
  document.getElementById('heroPower').innerText = h.power;

  let vDiv = document.getElementById('villains');
  vDiv.innerHTML = "";
  h.villains.forEach(v=>{
    let d=document.createElement('div');
    d.className='villain';
    d.innerHTML = `<p>${v}</p>`;
    d.onclick = ()=> startFight(h.name, v);
    vDiv.appendChild(d);
  });
}

/* BATTLE */
let f1Sel=document.getElementById('f1');
let f2Sel=document.getElementById('f2');

heroes.forEach(h=>{
  let o1=document.createElement('option');
  o1.text=h.name;
  f1Sel.add(o1);

  let o2=document.createElement('option');
  o2.text=h.name;
  f2Sel.add(o2);
});

function startFight(h,v){
  showPage('battle');
  f1Sel.value=h;
  f2Sel.value=v;
}

function fight(){
  let f1=f1Sel.value;
  let f2=f2Sel.value;
  let log=document.getElementById('log');
  log.innerHTML="";

  let scenes=[
    {t:`${f1} lands dramatically`,img:"Hero landing"},
    {t:`${f2} charges with power`,img:"Energy attack"},
    {t:`${f1}: This ends now`,img:"Close face"},
    {t:`Explosion rocks the field`,img:"Explosion"}
  ];

  scenes.forEach((s,i)=>{
    setTimeout(()=>{
      let d=document.createElement('div');
      d.innerHTML=`${s.t}<br><small>🎨 ${s.img}</small>`;
      log.appendChild(d);
    },i*700);
  });

  setTimeout(()=>{
    let win=Math.random()>0.5?f1:f2;
    let d=document.createElement('div');
    d.innerHTML=`<b>🏆 Winner: ${win}</b>`;
    log.appendChild(d);
  },scenes.length*700);
}

/* BAZAAR */
function publish(){
  let title=document.getElementById('title').value;
  let price=document.getElementById('price').value;
  let desc=document.getElementById('desc').value;
  let files=document.getElementById('file').files;

  let div=document.createElement('div');
  div.className='listing';

  let previews="";
  Array.from(files).forEach(f=>{
    let url=URL.createObjectURL(f);
    if(f.type.startsWith('image')){
      previews+=`<img src="${url}" width="100%">`;
    }else if(f.type.startsWith('video')){
      previews+=`<video src="${url}" controls width="100%"></video>`;
    }
  });

  div.innerHTML=`
    ${previews}
    <h4>${title}</h4>
    <p>${desc}</p>
    <b>${price ? "$"+price : "Free"}</b>
  `;

  document.getElementById('listings').prepend(div);
}

</script>

</body>
</html>

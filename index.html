<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLDS — Ultimate Multiverse Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
/* SAME STYLES (unchanged for brevity) */
:root {
  --red:#ff2a00; --red-glow:rgba(255,42,0,0.35);
  --amber:#ffaa00; --bg:#050508;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#f0ede8; --muted:rgba(240,237,232,0.45);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text)}
.page{display:none}
.page.active-page{display:block}
.navbar{position:fixed;top:0;width:100%;height:60px;display:flex;justify-content:space-between;align-items:center;padding:0 20px;background:#000}
.nav-item{cursor:pointer;margin-left:10px}
.active{color:var(--red)}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-logo" data-page="home">WORLDS</div>
  <div>
    <span class="nav-item" data-page="home">Home</span>
    <span class="nav-item" data-page="bazaar">Bazaar</span>
    <span class="nav-item" data-page="battle">Battle</span>
  </div>
</nav>

<div id="homePage" class="page active-page">
  <h1>Welcome to WORLDS</h1>
</div>

<div id="battlePage" class="page">
  <h1>Battle Arena</h1>
  <button id="startFightBtn">FIGHT</button>
</div>

<div id="bazaarPage" class="page">
  <h1>Bazaar</h1>

  <input id="uploadTitle" placeholder="Title">
  <input id="uploadPrice" placeholder="Price">
  <textarea id="uploadDesc" placeholder="Description"></textarea>
  <button id="publishBtn">Publish</button>

  <div id="bazaarListings"></div>
</div>

<script>
/* ---------------- NAVIGATION FIX ---------------- */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
  document.getElementById(id).classList.add('active-page');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.querySelector('[data-page="'+id.replace("Page","")+'"]');
  if(nav) nav.classList.add('active');
}

document.querySelectorAll('[data-page]').forEach(el=>{
  el.onclick=()=>showPage(el.dataset.page+"Page");
});

showPage("homePage");

/* ---------------- BATTLE FIX ---------------- */
let f1locked=false,f2locked=false;

document.getElementById('startFightBtn').onclick=()=>{
  if(!f1locked||!f2locked){
    alert("Lock both fighters first!");
    return;
  }
  alert("Fight simulated!");
};

/* ---------------- LOCAL STORAGE ---------------- */
const STORAGE_KEY="worlds_items";

function loadItems(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
}

function saveItems(items){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
}

function renderItems(){
  const container=document.getElementById('bazaarListings');
  container.innerHTML="";
  loadItems().forEach(item=>{
    const div=document.createElement('div');
    div.innerHTML=`
      <h3>${item.title}</h3>
      <p>${item.desc}</p>
      <b>${item.price? "$"+item.price:"Free"}</b>
    `;
    container.appendChild(div);
  });
}

document.getElementById('publishBtn').onclick=()=>{
  const title=document.getElementById('uploadTitle').value.trim();
  const price=document.getElementById('uploadPrice').value;
  const desc=document.getElementById('uploadDesc').value.trim();

  if(!title) return;

  const items=loadItems();
  items.unshift({title,price,desc});
  saveItems(items);
  renderItems();

  document.getElementById('uploadTitle').value="";
  document.getElementById('uploadPrice').value="";
  document.getElementById('uploadDesc').value="";
};

renderItems();
</script>

</body>
</html>

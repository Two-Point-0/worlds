<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a2c3e;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6c7a8a;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #dce4ec;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            background: #fff;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background: #3a7bc9;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .db-status {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
            font-size: 12px;
            color: #8e9eae;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>Create Account</h1>
        <div class="subtitle">Fill in your details below</div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" name="first_name" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" name="last_name" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" name="email" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="text" id="password" name="password" value="0000" required>
            </div>
            
            <button type="submit">Register</button>
        </form>
        
        <div id="message" class="message"></div>
        <div class="db-status">
            📀 Connected to Dummy Database | Data stored locally
        </div>
    </div>

    <script>
        // Dummy Database - stores data in browser's localStorage
        // This simulates a real database connection
        
        class DummyDatabase {
            constructor() {
                this.dbName = 'registration_db';
                this.initDatabase();
            }
            
            initDatabase() {
                if (!localStorage.getItem(this.dbName)) {
                    localStorage.setItem(this.dbName, JSON.stringify([]));
                    console.log('✅ Dummy database initialized');
                }
            }
            
            insert(data) {
                const users = JSON.parse(localStorage.getItem(this.dbName));
                const newUser = {
                    id: Date.now(),
                    ...data,
                    password_hash: this.hashPassword(data.password),
                    created_at: new Date().toISOString()
                };
                users.push(newUser);
                localStorage.setItem(this.dbName, JSON.stringify(users));
                return newUser;
            }
            
            hashPassword(password) {
                // Simple hash simulation (in real app, use proper hashing on server)
                let hash = 0;
                for (let i = 0; i < password.length; i++) {
                    hash = ((hash << 5) - hash) + password.charCodeAt(i);
                    hash |= 0;
                }
                return 'hash_' + Math.abs(hash).toString(16);
            }
            
            getAll() {
                return JSON.parse(localStorage.getItem(this.dbName));
            }
            
            findByEmail(email) {
                const users = this.getAll();
                return users.find(u => u.email === email);
            }
        }
        
        // Initialize dummy database
        const db = new DummyDatabase();
        
        // Handle form submission
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Get form values
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Validation
            if (!firstName || !lastName || !email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            // Check if email already exists in dummy database
            const existingUser = db.findByEmail(email);
            if (existingUser) {
                showMessage('Email already registered. Please use a different email.', 'error');
                return;
            }
            
            // Save to dummy database
            try {
                const newUser = db.insert({
                    first_name: firstName,
                    last_name: lastName,
                    email: email,
                    password: password
                });
                
                // Show success message
                showMessage(`✅ Registration successful! Welcome ${firstName} ${lastName}. Data saved to dummy database.`, 'success');
                
                // Clear form (keep password default)
                document.getElementById('firstName').value = '';
                document.getElementById('lastName').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '0000';
                
                // Log to console to show database contents
                console.log('📀 Dummy Database Contents:', db.getAll());
                console.log('🔐 Password hash stored:', newUser.password_hash);
                
            } catch (error) {
                showMessage('Database error. Please try again.', 'error');
                console.error('Database error:', error);
            }
        });
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 4000);
        }
        
        // Optional: Display current database stats in console
        console.log('📀 Dummy Database Ready | Total users:', db.getAll().length);
    </script>
</body>
</html>
